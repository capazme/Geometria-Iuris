# ═══════════════════════════════════════════════════════════════════════
# CLS Pipeline v3.2 — Configurazione
# ═══════════════════════════════════════════════════════════════════════
# Cross-Lingual Semantics Analysis Pipeline
#
# Questo file controlla tutti i parametri della pipeline: modelli,
# esperimenti, percorsi, output e logging. Ogni sezione e' documentata
# con il significato del parametro, il suo effetto e le conseguenze
# di una modifica.
#
# Formato: YAML (indentazione a 2 spazi, niente tab)
# Caricato da: src/core/config_loader.py -> load_config()
# ═══════════════════════════════════════════════════════════════════════

pipeline:
  version: "3.2.0"
  name: "CLS Pipeline"


# ═══════════════════════════════════════════════════════════════════════
# MODELLI DI EMBEDDING
# ═══════════════════════════════════════════════════════════════════════
# I due modelli producono le rappresentazioni vettoriali dei termini
# giuridici. "weird" codifica la prospettiva anglo-occidentale (WEIRD =
# Western, Educated, Industrialized, Rich, Democratic), "sinic" codifica
# la prospettiva sinica (cinese). Tutti e 5 gli esperimenti confrontano
# le geometrie di questi due spazi.
#
# I modelli vengono scaricati da HuggingFace al primo avvio e salvati
# nella cartella `models/`. La cache degli embedding calcolati e'
# separata (cartella `cache/`): cambiare modello invalida la cache.
# ═══════════════════════════════════════════════════════════════════════
models:

  weird:
    # --- name ---
    # Identificativo HuggingFace del modello WEIRD.
    # Attuale: E5-large-v2 di Microsoft, addestrato su dati inglesi.
    # Modificare per usare un altro encoder (es. "all-MiniLM-L6-v2",
    # "BAAI/bge-large-en-v1.5"). Attenzione: cambiare modello
    # invalida la cache e puo' cambiare la dimensione embedding.
    name: "intfloat/e5-large-v2"

    # --- dimension ---
    # Dimensione dello spazio embedding. DEVE corrispondere a quella
    # effettiva del modello (1024 per E5-large-v2). Usato solo come
    # sanity check dopo l'encoding: se non corrisponde, viene emesso
    # un warning ma il pipeline prosegue. Non modifica il modello.
    dimension: 1024

    # --- label ---
    # Etichetta leggibile usata nei grafici, report HTML e log.
    # Puramente cosmetica: cambiarla non influenza i calcoli.
    label: "WEIRD Model (E5-large-v2, Microsoft)"

    # --- language ---
    # Lingua ISO 639-1 del modello. Usata nel report HTML e nei log.
    # Non influenza l'encoding (il modello e' gia' addestrato su una
    # lingua specifica), ma documenta la scelta.
    language: "en"

    # --- prefix ---
    # Prefisso aggiunto a ogni testo prima dell'encoding.
    # E5 richiede "query: " per funzionare correttamente (l'embedding
    # senza prefisso e' sub-ottimale). Altri modelli (es. BGE-EN)
    # richiedono "Represent this sentence: " o nessun prefisso.
    # IMPORTANTE: il prefisso non viene incluso nella chiave di cache,
    # quindi cambiarlo richiede di svuotare la cache manualmente.
    prefix: "query: "

  sinic:
    # Modello sinico: BGE-large-zh di BAAI (Beijing Academy of AI).
    # Addestrato su dati cinesi, supporta cinese semplificato e
    # tradizionale. Stessa dimensione 1024 di E5, ma gli spazi
    # vettoriali NON sono allineati (motivo per cui servono RSA/GW
    # invece di confronti diretti).
    name: "BAAI/bge-large-zh-v1.5"
    dimension: 1024
    label: "Sinic Model (BGE-ZH, BAAI)"
    language: "zh"
    # BGE-zh non richiede prefisso per gli embedding.
    prefix: ""


# ═══════════════════════════════════════════════════════════════════════
# GRUPPI DI MODELLI (analisi multi-modello)
# ═══════════════════════════════════════════════════════════════════════
# Usati con --multi-model per eseguire gli esperimenti su tutte le
# coppie weird × sinic (prodotto cartesiano: 3×3 = 9 coppie).
# Dimostra che gli effetti osservati non dipendono dal singolo modello
# ma dalla tradizione culturale.
#
# Criteri di selezione:
# - Solo modelli MONOLINGUI (no multilingui: contaminano lo spazio)
# - Diversita' di paradigma: contrastivo, RetroMAE, CoSENT, Siamese
# - Diversita' di architettura: BERT-large, MacBERT, custom BERT+RoPE
# - Diversita' di organizzazione: Microsoft, BAAI, Nomic, DMetaSoul
# ═══════════════════════════════════════════════════════════════════════
model_groups:
  weird:
    # E5-large-v2 (Microsoft): contrastivo debolmente supervisionato
    - name: "intfloat/e5-large-v2"
      dimension: 1024
      label: "E5-large-v2"
      language: "en"
      prefix: "query: "

    # BGE-EN-v1.5 (BAAI): RetroMAE pre-training + contrastivo
    - name: "BAAI/bge-large-en-v1.5"
      dimension: 1024
      label: "BGE-EN-v1.5"
      language: "en"
      prefix: ""

    # Nomic-v1.5 (Nomic AI): multi-stage contrastivo + Matryoshka
    - name: "nomic-ai/nomic-embed-text-v1.5"
      dimension: 768
      label: "Nomic-v1.5"
      language: "en"
      prefix: "search_document: "

  sinic:
    # BGE-ZH-v1.5 (BAAI): RetroMAE + contrastivo su corpus Wudao
    - name: "BAAI/bge-large-zh-v1.5"
      dimension: 1024
      label: "BGE-ZH-v1.5"
      language: "zh"
      prefix: ""

    # Text2vec (shibing624): CoSENT rank loss su MacBERT
    - name: "shibing624/text2vec-base-chinese"
      dimension: 768
      label: "Text2vec-ZH"
      language: "zh"
      prefix: ""

    # SBERT-ZH-v2 (DMetaSoul): Siamese BERT su SimCLUE
    - name: "DMetaSoul/sbert-chinese-general-v2"
      dimension: 768
      label: "SBERT-ZH-v2"
      language: "zh"
      prefix: ""


# ═══════════════════════════════════════════════════════════════════════
# DISPOSITIVO DI CALCOLO
# ═══════════════════════════════════════════════════════════════════════
# Controlla dove vengono eseguiti i calcoli dei modelli PyTorch.
# Gli esperimenti statistici (permutazioni, bootstrap) usano NumPy
# su CPU indipendentemente da questa impostazione.
# ═══════════════════════════════════════════════════════════════════════
device:
  # --- preferred ---
  # Dispositivo PyTorch per l'encoding dei modelli.
  #   "auto"  : rileva automaticamente (MPS su Apple Silicon, CUDA
  #             su GPU NVIDIA, altrimenti CPU). Scelta consigliata.
  #   "mps"   : forza Apple Silicon GPU (Metal Performance Shaders).
  #             Errore se non disponibile.
  #   "cuda"  : forza GPU NVIDIA. Errore se non disponibile.
  #   "cpu"   : forza CPU. Piu' lento ma sempre disponibile.
  #             Utile per debug o se la GPU da' problemi.
  preferred: "auto"

  # --- batch_size ---
  # Numero di testi codificati in parallelo dal modello.
  # Valori piu' alti = piu' veloce ma piu' memoria GPU/RAM.
  #   - 32: buon compromesso per 16 GB RAM + MPS (Apple Silicon)
  #   - 64-128: possibile con 32+ GB RAM o CUDA con VRAM dedicata
  #   - 8-16: ridurre se si verificano errori di memoria (OOM)
  # Con ~770 termini e batch_size=32, servono ~24 batch per modello.
  batch_size: 32


# ═══════════════════════════════════════════════════════════════════════
# RIPRODUCIBILITA'
# ═══════════════════════════════════════════════════════════════════════
reproducibility:
  # --- random_seed ---
  # Seme per tutti i generatori di numeri casuali (NumPy, PyTorch).
  # Garantisce che permutazioni, bootstrap e UMAP producano
  # risultati identici ad ogni esecuzione. Cambiare il seme produce
  # p-value e intervalli di confidenza leggermente diversi, ma le
  # conclusioni qualitative non dovrebbero cambiare (se cambiano,
  # il risultato originale non era robusto).
  # Valore 42: convenzione comune in machine learning.
  random_seed: 42


# ═══════════════════════════════════════════════════════════════════════
# ESPERIMENTI
# ═══════════════════════════════════════════════════════════════════════
# Ogni esperimento confronta le geometrie degli spazi WEIRD e Sinic
# da una prospettiva diversa. I parametri qui sotto controllano la
# precisione statistica (n_permutations, n_bootstrap) e le scelte
# metodologiche (metodo di linkage, k per i vicinati, ecc.).
#
# REGOLA GENERALE sulle permutazioni:
# - Piu' permutazioni = p-value piu' preciso, ma tempo di calcolo
#   maggiore (relazione lineare).
# - Per esplorare/debug: 500-1000 permutazioni bastano.
# - Per risultati pubblicabili: >= 5000 (meglio 10000).
# - Il p-value minimo possibile e' 1/(n_permutations+1), quindi
#   con 5000 perm il p minimo e' ~0.0002.
# ═══════════════════════════════════════════════════════════════════════
experiments:

  # -------------------------------------------------------------------
  # Esperimento 1: RSA + Test di Mantel
  # -------------------------------------------------------------------
  # Confronta le matrici di dissimilarita' (RDM) dei due spazi.
  # Domanda: l'ordine relativo delle distanze tra termini e' simile?
  # Metodo: Spearman r tra i triangoli superiori delle RDM, con
  # significativita' via test di Mantel (permutazione righe/colonne).
  # Rif.: Kriegeskorte et al. (2008); Mantel (1967).
  rsa:
    # --- n_permutations ---
    # Numero di permutazioni per il test di Mantel.
    # Con ~400 core (79800 coppie), 10000 perm forniscono una
    # buona risoluzione del p-value. Ridurre a 1000 per test veloci.
    n_permutations: 10000

    # --- n_bootstrap ---
    # Numero di ricampionamenti block bootstrap per l'intervallo di
    # confidenza. Ricampiona *termini interi* (non coppie di distanze)
    # per rispettare la dipendenza tra entries della RDM.
    # Rif.: Nili et al. (2014) PLoS Comp. Bio.
    n_bootstrap: 1000

  # -------------------------------------------------------------------
  # Esperimento 2: Distanza di Gromov-Wasserstein
  # -------------------------------------------------------------------
  # Misura quanto "costa" trasformare la geometria di uno spazio
  # nell'altra via trasporto ottimale, senza allineare gli spazi.
  # Domanda: le strutture metriche interne sono isomorfe?
  # Rif.: Peyre' & Cuturi (2019); Alvarez-Melis & Jaakkola (2018).
  gromov_wasserstein:
    # --- entropic_reg ---
    # Regolarizzazione entropica (epsilon) per Sinkhorn.
    # Rende il problema di trasporto ottimale risolvibile in modo
    # efficiente, ma introduce un bias: il piano di trasporto diventa
    # piu' "sfocato" (diffuso) rispetto all'ottimo esatto.
    #   - 0.001-0.01: buon compromesso precisione/convergenza
    #   - 0.005: valore attuale, scelto dopo grid search
    #   - < 0.001: piu' preciso ma rischio di instabilita' numerica
    #     (Sinkhorn potrebbe non convergere)
    #   - > 0.1: troppo sfocato, perde informazione strutturale
    # Rif.: Cuturi (2013) "Sinkhorn Distances", NeurIPS.
    entropic_reg: 0.005

    # --- use_sinkhorn ---
    # Se true, usa l'algoritmo di Sinkhorn (regolarizzato).
    # Se false, usa il solver esatto di GW (molto piu' lento,
    # sconsigliato per N > 50). Con 250 termini e' essenziale
    # lasciare true.
    use_sinkhorn: true

    # --- n_permutations ---
    # Numero di permutazioni per il test di significativita'.
    # Ogni permutazione ricalcola GW su embedding permutati,
    # quindi e' computazionalmente costoso. 5000 e' un buon
    # compromesso; ridurre a 500 per debug.
    n_permutations: 5000

  # -------------------------------------------------------------------
  # Esperimento 3: Proiezione su Assi Assiologici (Kozlowski)
  # -------------------------------------------------------------------
  # Costruisce "assi culturali" (es. individuo-collettivo,
  # formale-informale) dallo spazio embedding e proietta i termini.
  # Domanda: i termini si collocano nello stesso modo lungo gli assi
  # culturali nei due modelli?
  # Rif.: Kozlowski, Taddy & Evans (2019), ASR 84(5).
  axes:
    # --- n_bootstrap ---
    # Numero di ricampionamenti bootstrap per gli intervalli di
    # confidenza degli score di proiezione.
    #   - 1000: standard per CI al 95% (Efron, 1979)
    #   - 5000-10000: per CI piu' stretti e stabili
    #   - 200-500: accettabile per analisi esplorative
    # Il bootstrap ricampiona le coppie di parole che definiscono
    # l'asse, NON i termini proiettati.
    n_bootstrap: 1000

  # -------------------------------------------------------------------
  # UMAP (solo visualizzazione, non e' un esperimento)
  # -------------------------------------------------------------------
  # Proietta gli embedding ad alta dimensione in 2D per
  # visualizzazione. NON usato per analisi statistica (la
  # riduzione dimensionale distorce le distanze).
  # Rif.: McInnes, Healy & Melville (2018).
  umap:
    # --- n_neighbors ---
    # Numero di vicini considerati per la struttura locale.
    #   - Basso (5-10): preserva cluster locali, piu' frammentato
    #   - Medio (15): default, buon equilibrio locale/globale
    #   - Alto (30-50): struttura piu' globale, cluster meno netti
    n_neighbors: 15

    # --- min_dist ---
    # Distanza minima tra punti nel piano 2D.
    #   - 0.0: punti piu' compattati, cluster densi
    #   - 0.1: default, leggera separazione
    #   - 0.5-1.0: punti piu' sparsi, meno overlap
    min_dist: 0.1

    # --- metric ---
    # Metrica di distanza nello spazio originale.
    # "cosine" e' lo standard per embedding di testo (invariante
    # alla norma). Alternative: "euclidean", "correlation".
    metric: "cosine"

    # --- n_components ---
    # Numero di dimensioni del proiezione. 2 per scatter plot,
    # 3 per visualizzazione 3D (non supportata dal report HTML).
    n_components: 2

    # --- init ---
    # Metodo di inizializzazione dello spazio ridotto.
    #   "spectral": usa autovettori del grafo dei vicini.
    #              Piu' stabile e riproducibile di "random".
    #   "random" : piu' veloce ma risultati variabili tra run.
    init: "spectral"

  # -------------------------------------------------------------------
  # Esperimento 4: Clustering Gerarchico + Fowlkes-Mallows
  # -------------------------------------------------------------------
  # Costruisce dendrogrammi indipendenti per WEIRD e Sinic, poi
  # confronta le partizioni risultanti a diversi livelli di
  # granularita' (k) con l'indice di Fowlkes-Mallows.
  # Domanda: i due modelli raggruppano i concetti nella stessa
  # tassonomia?
  # Rif.: Fowlkes & Mallows (1983), JASA 78(383).
  clustering:
    # --- method ---
    # Metodo di linkage per il clustering agglomerativo.
    #   "ward"     : minimizza varianza intra-cluster. Produce
    #                cluster compatti e di dimensione simile.
    #                Richiede distanza euclidea.
    #   "average"  : UPGMA, media delle distanze tra coppie.
    #                Piu' robusto a outlier, cluster meno regolari.
    #   "complete" : distanza massima tra coppie (diametro).
    #                Tende a cluster piccoli e stretti.
    #   "single"   : distanza minima (nearest neighbor).
    #                Soggetto a "chaining" — raramente utile.
    # Ward e' il piu' usato in NLP per tassonomie semantiche.
    method: "ward"

    # --- k_values ---
    # Lista di valori k (numero di cluster) a cui tagliare il
    # dendrogramma per calcolare l'indice FM.
    # Usare multi-k serve a verificare che il risultato non
    # dipenda dalla scelta arbitraria della granularita'.
    #   - [3, 5, 7, 10]: range ampio, dal macro al granulare
    #   - Aggiungere valori (es. [2,3,5,7,10,15]) per analisi
    #     piu' fine, ma ciascun k aggiunge n_permutations calcoli.
    #   - Ogni k deve essere >= 2 e < numero di termini core (~400).
    k_values: [3, 5, 7, 10]

    # --- n_permutations ---
    # Permutazioni per il test di significativita' dell'indice FM
    # a ciascun k. Totale permutazioni = len(k_values) * n_perm.
    # Con k_values=[3,5,7,10] e 5000 perm: 20000 permutazioni.
    n_permutations: 5000

  # -------------------------------------------------------------------
  # Esperimento 5: Neighborhood Divergence Analysis (NDA)
  # -------------------------------------------------------------------
  # Part A: confronta i vicinati k-NN dei termini tra i due spazi
  # (Jaccard). Part B: aritmetica vettoriale (decomposizioni
  # normative) e confronto dei vicinati dei residui.
  # Domanda A: i "falsi amici" — termini con vicini diversi nei
  # due spazi (stesso nome, significato diverso).
  # Domanda B: le componenti giuridiche (es. giustizia - stato)
  # hanno interpretazioni simili?
  # Rif.: Haemmerli et al. (2024), arXiv:2411.08687.
  nda:
    # --- k ---
    # Numero di vicini (k-nearest neighbors) per il calcolo
    # dell'indice di Jaccard.
    #   - 5: vicinato molto stretto, sensibile al rumore
    #   - 10: default, buon equilibrio sensibilita'/stabilita'
    #   - 20-30: vicinato ampio, cattura relazioni piu' deboli
    #           ma diluisce le differenze
    # Con ~770 termini (~400 core + ~320 bg + 50 ctrl), k=10 significa
    # che il vicinato comprende ~1.3% dei termini totali.
    # Con il pool espanso, k=15 puo' catturare relazioni piu' stabili.
    k: 15

    # --- n_permutations ---
    # Permutazioni per il test di significativita' del Jaccard
    # medio (Part A) e dei Jaccard dei residui (Part B).
    n_permutations: 5000


# ═══════════════════════════════════════════════════════════════════════
# PERCORSI
# ═══════════════════════════════════════════════════════════════════════
# Tutti i percorsi sono relativi alla root del progetto (la cartella
# che contiene questo file config.yaml). Vengono creati
# automaticamente al primo avvio se non esistono.
# ═══════════════════════════════════════════════════════════════════════
paths:
  # Dati grezzi e fonti (DOJ HK, CC-CEDICT, ecc.)
  data: "data"
  # Dataset processato: legal_terms.json (~770 termini, v3.0)
  processed: "data/processed"
  # Cache degli embedding calcolati (file .npy per modello)
  # Svuotare con: python -c "from src.embeddings.client import ...; ..."
  # oppure cancellare manualmente i file .npy
  cache: "cache"
  # Cartella output principale (results.json, visualization.html)
  output: "output"
  # Grafici PNG generati dagli esperimenti
  plots: "output/plots"
  # Modelli HuggingFace scaricati (~2-3 GB per modello)
  models: "models"


# ═══════════════════════════════════════════════════════════════════════
# OUTPUT
# ═══════════════════════════════════════════════════════════════════════
# Controlla formato e qualita' dei risultati prodotti dalla pipeline.
# ═══════════════════════════════════════════════════════════════════════
output:
  # Nome del file JSON con tutti i risultati numerici.
  # Usato come input per la generazione dell'HTML.
  results_file: "results.json"

  # Nome del file HTML interattivo generato.
  visualization_file: "visualization.html"

  # --- save_plots ---
  # Se true, salva i grafici come file PNG separati nella cartella
  # plots. I grafici vengono comunque incorporati nell'HTML come
  # base64, quindi disabilitare non perde informazione nel report.
  save_plots: true

  # --- plot_dpi ---
  # Risoluzione dei grafici PNG (dots per inch).
  #   - 150: bozza, file piccoli (~100-200 KB per grafico)
  #   - 300: qualita' pubblicazione, buon compromesso
  #   - 600: alta risoluzione per stampa, file grandi (~1-2 MB)
  # Influenza anche le immagini base64 nell'HTML (dimensione file).
  plot_dpi: 300

  # --- plot_figsize ---
  # Dimensione figura matplotlib [larghezza, altezza] in pollici.
  # [12, 8] e' adatto per grafici con molte etichette (50 termini).
  # Ridurre a [8, 6] per grafici piu' compatti.
  plot_figsize: [12, 8]

  # --- plot_style ---
  # Tema seaborn per i grafici.
  #   "whitegrid"  : sfondo bianco con griglia (default, leggibile)
  #   "darkgrid"   : sfondo grigio con griglia
  #   "white"      : sfondo bianco senza griglia
  #   "ticks"      : solo tacche sugli assi
  plot_style: "whitegrid"


# ═══════════════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════════════
# Controlla la verbosita' dei messaggi durante l'esecuzione.
# I log vengono stampati su stderr (terminale) e non salvati su file.
# ═══════════════════════════════════════════════════════════════════════
logging:
  # --- level ---
  # Livello minimo dei messaggi visualizzati.
  #   "DEBUG"   : tutto, inclusi dettagli di ogni permutazione.
  #               Molto verboso, utile per diagnosi.
  #   "INFO"    : progresso generale (inizio/fine esperimenti,
  #               risultati principali). Consigliato per uso normale.
  #   "WARNING" : solo avvisi e errori.
  #   "ERROR"   : solo errori critici.
  level: "DEBUG"

  # Formato dei messaggi di log.
  # %(asctime)s   : timestamp
  # %(levelname)s : livello (DEBUG/INFO/WARNING/ERROR)
  # %(name)s      : nome del modulo Python
  # %(message)s   : testo del messaggio
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
