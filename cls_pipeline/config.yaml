# CLS Pipeline v2.0 Configuration
# ================================
# Cross-Lingual Semantics Analysis Pipeline

pipeline:
  version: "2.0.0"
  name: "CLS Pipeline"

# ---------------------------------------------------------------------------
# Models Configuration
# ---------------------------------------------------------------------------
models:
  weird:
    name: "intfloat/e5-large-v2"
    dimension: 1024
    label: "WEIRD Model (E5-large-v2, Microsoft)"
    language: "en"
    # E5 requires "query: " or "passage: " prefix for inputs
    prefix: "query: "

  sinic:
    name: "BAAI/bge-large-zh-v1.5"
    dimension: 1024
    label: "Sinic Model (BGE-ZH, BAAI)"
    language: "zh"
    prefix: ""

# ---------------------------------------------------------------------------
# Device Configuration (auto-detected if not specified)
# ---------------------------------------------------------------------------
device:
  # Preferred device: auto | mps | cuda | cpu
  preferred: "auto"
  # Batch size for embedding generation
  batch_size: 32

# ---------------------------------------------------------------------------
# Reproducibility
# ---------------------------------------------------------------------------
reproducibility:
  random_seed: 42

# ---------------------------------------------------------------------------
# Experiments Configuration
# ---------------------------------------------------------------------------
experiments:
  # Experiment 1: RSA + Mantel Test
  rsa:
    n_permutations: 10000

  # Experiment 2: Gromov-Wasserstein
  gromov_wasserstein:
    entropic_reg: 0.005
    use_sinkhorn: true
    n_permutations: 5000

  # Experiment 3: Axiological Axis Projection (Kozlowski)
  axes:
    n_bootstrap: 1000

  # UMAP (visualization only, not an experiment)
  umap:
    n_neighbors: 15
    min_dist: 0.1
    metric: "cosine"
    n_components: 2
    init: "spectral"

  # Experiment 4: Hierarchical Clustering
  clustering:
    method: "ward"
    k_values: [3, 5, 7, 10]
    n_permutations: 5000

  # Experiment 5: Neighborhood Divergence Analysis
  nda:
    k: 10
    n_permutations: 5000

# ---------------------------------------------------------------------------
# Paths (relative to project root)
# ---------------------------------------------------------------------------
paths:
  data: "data"
  processed: "data/processed"
  cache: "cache"
  output: "output"
  plots: "output/plots"
  models: "models"

# ---------------------------------------------------------------------------
# Output Configuration
# ---------------------------------------------------------------------------
output:
  results_file: "results.json"
  visualization_file: "visualization.html"
  save_plots: true
  plot_dpi: 300
  plot_figsize: [12, 8]
  plot_style: "whitegrid"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "WARNING"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
